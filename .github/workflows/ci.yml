name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Phase-3 Track D weekly handshake. Drives the full 8-step
    # discovery protocol against the *live* fixture URLs to surface
    # upstream drift (a renamed manifest field, a 404'd llms.txt link)
    # between merges. PRs still get the offline-fixtures run via the
    # `check` job below.
    - cron: '0 14 * * 1'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Phase-5 Track D needs origin/main reachable so
          # check-schema-compat can diff against the PR base. Default
          # checkout fetches only HEAD; full history is cheap on this
          # repo (mostly markdown + small Python).
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Phase-1 catalog dependencies
        # build-catalog.py + validate-catalog.py need jsonschema;
        # the profile/build/test_*.py suite needs pytest. Pinned-ish —
        # Draft 2020-12 has been stable for years and the validator API
        # is small. Bump as needed; not part of the schema-compat
        # contract.
        run: pip install --upgrade pip 'jsonschema>=4.18' pytest

      - name: Run Phase-1 catalog unit tests
        # TDD safety net for build-catalog.py + validate-catalog.py.
        # Fails fast if a script edit broke a test.
        run: pytest profile/build/ -q

      - name: docs/ prose-only gate
        # Cross-repo guardrail: docs/ holds only human-readable prose.
        # Engine-free find-based check; same target lands in every
        # tier-1 + tier-2 + tier-3 repo.
        run: make check-docs-prose

      - name: Validate catalog (schema-strict)
        # Real jsonschema validation against tools.schema.json +
        # task_index.schema.json. Replaces the prior parse-only gate.
        run: make validate-catalog

      - name: Catalog drift gate
        # Regenerate the catalog from live tier-1+2+3 manifest state,
        # then `git diff --exit-code` — same drift-gate pattern every
        # tier-N repo uses. If a contributor edits tools.json by hand
        # or a manifest in another repo changes without `make catalog`
        # being run here, this step fails.
        #
        # Network-dependent (fetches raw.githubusercontent.com); CI
        # runners always have egress. For local maintainer use the
        # same target works.
        run: |
          make catalog
          git diff --exit-code profile/tools.json profile/task_index.json

      - name: Recipe structural gate (Phase-3 Track D)
        # Every recipe under docs/recipes/*.md must pass --validate-only:
        # well-formed frontmatter, a ``## Steps`` bash block, and at
        # least one ``must contain: …`` assertion under ``## Expected
        # output``. The M toolchain isn't installed here so we don't
        # actually execute the recipe — that's a maintainer task when
        # bumping `verified_on`.
        run: make recipes-check

      - name: Freshness gate (Phase-5 Track A — PR-mode)
        # Per phase5-plan.md §2 A3: PR-mode runs default thresholds
        # (--warn-days 90 --stale-days 180; WARN allowed). The weekly
        # cron firing (handshake job below) adds --strict to escalate
        # WARN to failure so a freshness slip surfaces within 7 days.
        if: github.event_name != 'schedule'
        run: make check-freshness

      - name: Link inventory (Phase-5 Track B — PR-mode)
        # Per phase5-plan.md §3 B3: PR-mode runs --offline so CI is
        # network-free + flake-free. The weekly cron firing (handshake
        # job below) does the actual HEAD walk against the live URLs.
        if: github.event_name != 'schedule'
        run: make check-links

      - name: License inventory (Phase-5 Track C — PR-mode)
        # Per phase5-plan.md §4 C3: PR-mode runs --offline (sanity-
        # checks the declared `license` field is in our signature
        # dict; doesn't fetch LICENSE files). The weekly cron firing
        # (handshake job below) does the full LICENSE-body match.
        if: github.event_name != 'schedule'
        run: make check-licenses

      - name: Schema-version policing (Phase-5 Track D — per-PR only)
        # Per phase5-plan.md §5 D3: this gate fires per-PR only — a
        # weekly cron firing wouldn't add signal because schema_compat
        # bumps land via PRs by definition. Diffs against origin/main
        # so the gate has a stable base ref regardless of which branch
        # opened the PR.
        if: github.event_name != 'schedule'
        run: make check-schema-compat

  handshake:
    # Phase-3 Track D — discovery-protocol handshake. Runs the 8-step
    # external-agent walk-through end-to-end. On push/PR uses bundled
    # offline fixtures; the weekly cron firing (see `schedule` above)
    # is the place to swap in --live for upstream-drift detection.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --upgrade pip 'jsonschema>=4.18'

      - name: Discovery-protocol handshake (offline fixtures)
        if: github.event_name != 'schedule'
        run: make handshake

      - name: Discovery-protocol handshake (live URLs)
        if: github.event_name == 'schedule'
        run: python3 profile/build/test-discovery-protocol.py --live

      - name: Freshness gate (Phase-5 Track A — cron --strict)
        # Phase-5 Track A weekly escalation: --strict treats WARN as
        # failure too, so a maintainer who let verified_on slip past
        # the 90-day warn threshold sees it within 7 days even if no
        # PR is opened in between.
        if: github.event_name == 'schedule'
        run: python3 profile/build/check-freshness.py --offline --strict

      - name: Link-check (Phase-5 Track B — cron live URLs)
        # Phase-5 Track B weekly fetch: HEAD every URL in llms.txt +
        # tools.json + task_index.json against the live web. A 404 or
        # transport failure surfaces here within 7 days even if no PR
        # opens in between. Per-PR jobs use --offline (see above).
        if: github.event_name == 'schedule'
        run: python3 profile/build/check-links.py

      - name: License-reconcile (Phase-5 Track C — cron full fetch)
        # Phase-5 Track C weekly fetch: pull each tools.<key>'s
        # LICENSE file from raw.githubusercontent.com and match it
        # against the declared `license` field's signature. A
        # declared-vs-body MISMATCH or a 404'd LICENSE file surfaces
        # within 7 days. Per-PR jobs use --offline (see above).
        if: github.event_name == 'schedule'
        run: python3 profile/build/check-licenses.py
