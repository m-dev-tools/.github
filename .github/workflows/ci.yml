name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Phase-3 Track D weekly handshake. Drives the full 8-step
    # discovery protocol against the *live* fixture URLs to surface
    # upstream drift (a renamed manifest field, a 404'd llms.txt link)
    # between merges. PRs still get the offline-fixtures run via the
    # `check` job below.
    - cron: '0 14 * * 1'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Phase-1 catalog dependencies
        # build-catalog.py + validate-catalog.py need jsonschema.
        # Pinned-ish — Draft 2020-12 has been stable for years and the
        # validator API is small. Bump as needed; not part of the
        # schema-compat contract.
        run: pip install --upgrade pip 'jsonschema>=4.18'

      - name: Run Phase-1 catalog unit tests
        # TDD safety net for build-catalog.py + validate-catalog.py.
        # Fails fast if a script edit broke a test.
        run: pip install pytest && pytest profile/build/ -q

      - name: docs/ prose-only gate
        # Cross-repo guardrail: docs/ holds only human-readable prose.
        # Engine-free find-based check; same target lands in every
        # tier-1 + tier-2 + tier-3 repo.
        run: make check-docs-prose

      - name: Validate catalog (schema-strict)
        # Real jsonschema validation against tools.schema.json +
        # task_index.schema.json. Replaces the prior parse-only gate.
        run: make validate-catalog

      - name: Catalog drift gate
        # Regenerate the catalog from live tier-1+2+3 manifest state,
        # then `git diff --exit-code` — same drift-gate pattern every
        # tier-N repo uses. If a contributor edits tools.json by hand
        # or a manifest in another repo changes without `make catalog`
        # being run here, this step fails.
        #
        # Network-dependent (fetches raw.githubusercontent.com); CI
        # runners always have egress. For local maintainer use the
        # same target works.
        run: |
          make catalog
          git diff --exit-code profile/tools.json profile/task_index.json

      - name: Recipe structural gate (Phase-3 Track D)
        # Every recipe under docs/recipes/*.md must pass --validate-only:
        # well-formed frontmatter, a ``## Steps`` bash block, and at
        # least one ``must contain: …`` assertion under ``## Expected
        # output``. The M toolchain isn't installed here so we don't
        # actually execute the recipe — that's a maintainer task when
        # bumping `verified_on`.
        run: make recipes-check

  handshake:
    # Phase-3 Track D — discovery-protocol handshake. Runs the 8-step
    # external-agent walk-through end-to-end. On push/PR uses bundled
    # offline fixtures; the weekly cron firing (see `schedule` above)
    # is the place to swap in --live for upstream-drift detection.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --upgrade pip 'jsonschema>=4.18'

      - name: Discovery-protocol handshake (offline fixtures)
        if: github.event_name != 'schedule'
        run: make handshake

      - name: Discovery-protocol handshake (live URLs)
        if: github.event_name == 'schedule'
        run: python3 profile/build/test-discovery-protocol.py --live
